<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Shop Nepal</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <h1>🌸 Sakura Shop Nepal</h1>
    <p>日本の商品をネパールへ届けます！</p>

    <button onclick="showProducts()">商品を見る</button>

    <hr>

    <div class="products">

        <div class="product">
            <img src="canmake-lip.webp.webp" alt="CANMAKE リップ">
            <h2>CANMAKE リップ</h2>
            <p>¥700</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="images/shiseido-sunscreen.webp" alt="資生堂 日焼け止め">
            <h2>資生堂 日焼け止め</h2>
            <p>¥2,500</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="hadalabo-lotion.webp" alt="肌ラボ 化粧水">
            <h2>肌ラボ 化粧水</h2>
            <p>¥980</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="images/sunscreen.webp" alt="DHC クレンジングオイル">
            <h2>DHC クレンジングオイル</h2>
            <p>¥1,800</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="images/cezanne-foundation.webp" alt="CEZANNE ファンデーション">
            <h2>CEZANNE ファンデーション</h2>
            <p>¥880</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="skii.jpg" alt="SK-II フェイシャルトリートメントエッセンス">
            <h2>SK-II エッセンス</h2>
            <p>¥23,000</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="KOSE.jpg" alt="KOSE 美容液">
            <h2>KOSE 美容液</h2>
            <p>¥3,500</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

        <div class="product">
            <img src="anessa .jpg" alt="ANESSA 日焼け止め">
            <h2>ANESSA 日焼け止め</h2>
            <p>¥2,800</p>
            <button onclick="addCart()">カートに追加</button>
            <button onclick="showProducts()">商品を見る</button>
        </div>

    </div>

    <h2>おすすめ商品</h2>

</body>
</html>
